<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Weather App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:42px;
    margin-bottom:25px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:18px;
    border:none;
    border-radius:18px;
    outline:none;
    background:#ffffff15;
    color:white;
    font-size:16px;
}

.search-box button{
    padding:18px 25px;
    border:none;
    border-radius:18px;
    background:#0ea5e9;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.card{
    background:#ffffff10;
    border-radius:30px;
    padding:30px;
    backdrop-filter:blur(10px);
    margin-bottom:25px;
}

.city{
    font-size:38px;
    font-weight:700;
}

.temp{
    font-size:85px;
    font-weight:700;
}

.desc{
    font-size:22px;
    margin-top:10px;
}

.details{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:25px;
}

.detail{
    background:#ffffff10;
    padding:18px;
    border-radius:20px;
    text-align:center;
}

.forecast-grid,
.hourly-grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
}

.forecast-card,
.hour-card{
    background:#ffffff10;
    padding:18px;
    border-radius:18px;
    text-align:center;
}

.loading{
    text-align:center;
    display:none;
    margin-bottom:20px;
}

.error{
    background:#ef4444;
    padding:14px;
    border-radius:14px;
    margin-bottom:20px;
    display:none;
}

@media(max-width:800px){

    .details{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:500px){

    .details{
        grid-template-columns:1fr;
    }

    .temp{
        font-size:65px;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1 class="title">🌦 Ultra Weather App</h1>

    <div class="error" id="errorBox"></div>

    <div class="loading" id="loading">
        Loading weather...
    </div>

    <div class="search-box">

        <input
        type="text"
        id="cityInput"
        placeholder="Enter city name">

        <button onclick="searchCity()">
            Search
        </button>

    </div>

    <div class="card">

        <div class="city" id="city">
            Search Any City
        </div>

        <div id="date"></div>

        <div class="temp" id="temp">
            --°C
        </div>

        <div class="desc" id="desc">
            Weather Description
        </div>

        <div class="details">

            <div class="detail">
                💨 Wind
                <h2 id="wind">--</h2>
            </div>

            <div class="detail">
                💧 Humidity
                <h2 id="humidity">--</h2>
            </div>

            <div class="detail">
                🌧 Rain
                <h2 id="rain">--</h2>
            </div>

            <div class="detail">
                🌡 Feels Like
                <h2 id="feels">--</h2>
            </div>

        </div>

    </div>

    <div class="card">

        <h2>🌤 7-Day Forecast</h2>

        <div class="forecast-grid" id="forecast"></div>

    </div>

    <div class="card">

        <h2>🕒 Hourly Forecast</h2>

        <div class="hourly-grid" id="hourly"></div>

    </div>

</div>

<script>

async function searchCity(){

    const city =
    document.getElementById("cityInput").value.trim();

    if(city === ""){

        showError("Please enter city name");
        return;

    }

    document.getElementById("loading").style.display = "block";

    try{

        // GET COORDINATES

        const geoURL =
        `https://geocoding-api.open-meteo.com/v1/search?name=${city}`;

        const geoResponse =
        await fetch(geoURL);

        const geoData =
        await geoResponse.json();

        if(!geoData.results){

            showError("City not found");
            return;

        }

        const place =
        geoData.results[0];

        const lat =
        place.latitude;

        const lon =
        place.longitude;

        document.getElementById("city").innerHTML =
        `${place.name}, ${place.country}`;

        getWeather(lat,lon);

    }

    catch(error){

        showError("Something went wrong");

    }

    finally{

        document.getElementById("loading").style.display = "none";

    }

}

async function getWeather(lat,lon){

    try{

        const weatherURL =
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,rain,weather_code,wind_speed_10m&hourly=temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;

        const response =
        await fetch(weatherURL);

        const data =
        await response.json();

        displayCurrent(data);

        displayForecast(data);

        displayHourly(data);

    }

    catch(error){

        showError("Weather fetch failed");

    }

}

function displayCurrent(data){

    document.getElementById("date").innerHTML =
    new Date().toDateString();

    document.getElementById("temp").innerHTML =
    `${Math.round(data.current.temperature_2m)}°C`;

    document.getElementById("desc").innerHTML =
    getWeatherText(data.current.weather_code);

    document.getElementById("wind").innerHTML =
    `${data.current.wind_speed_10m} km/h`;

    document.getElementById("humidity").innerHTML =
    `${data.current.relative_humidity_2m}%`;

    document.getElementById("rain").innerHTML =
    `${data.current.rain} mm`;

    document.getElementById("feels").innerHTML =
    `${Math.round(data.current.apparent_temperature)}°C`;

}

function displayForecast(data){

    const forecast =
    document.getElementById("forecast");

    forecast.innerHTML = "";

    for(let i=0;i<7;i++){

        const date =
        new Date(data.daily.time[i]);

        forecast.innerHTML += `

        <div class="forecast-card">

            <h3>
            ${date.toLocaleDateString("en-US",{weekday:"short"})}
            </h3>

            <h2>
            ${Math.round(data.daily.temperature_2m_max[i])}°
            </h2>

            <p>
            ${Math.round(data.daily.temperature_2m_min[i])}°
            </p>

            <small>
            ${getWeatherText(data.daily.weather_code[i])}
            </small>

        </div>

        `;

    }

}

function displayHourly(data){

    const hourly =
    document.getElementById("hourly");

    hourly.innerHTML = "";

    for(let i=0;i<12;i++){

        const time =
        data.hourly.time[i].split("T")[1];

        hourly.innerHTML += `

        <div class="hour-card">

            <h3>${time}</h3>

            <h2>
            ${Math.round(data.hourly.temperature_2m[i])}°C
            </h2>

        </div>

        `;

    }

}

function getWeatherText(code){

    const weatherCodes = {

        0:"Clear Sky",
        1:"Mainly Clear",
        2:"Partly Cloudy",
        3:"Cloudy",
        45:"Fog",
        48:"Rime Fog",
        51:"Light Drizzle",
        61:"Rain",
        71:"Snow",
        95:"Thunderstorm"

    };

    return weatherCodes[code] || "Unknown";

}

function showError(message){

    const errorBox =
    document.getElementById("errorBox");

    errorBox.innerHTML =
    message;

    errorBox.style.display =
    "block";

}

document.getElementById("cityInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){

        searchCity();

    }

});

searchCity = searchCity.bind(this);

</script>

</body>
</html>
