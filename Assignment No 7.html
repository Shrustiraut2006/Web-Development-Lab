<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial;
            background: #f1f5f9;
            padding: 30px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #0077b6;
            color: white;
        }

        tr:hover {
            background: #f0f9ff;
        }
    </style>
</head>
<body>

<h1 align="center">Student Record Table</h1>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Course</th>
        <th>Percentage</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Shrusti</td>
        <td>BCA</td>
        <td>89%</td>
    </tr>

    <tr>
        <td>102</td>
        <td>Rahul</td>
        <td>BSc IT</td>
        <td>84%</td>
    </tr>

    <tr>
        <td>103</td>
        <td>Priya</td>
        <td>BBA</td>
        <td>91%</td>
    </tr>
</table>

</body>
</html>
