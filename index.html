        }

        h1 {
            color: white;
            margin-top: 30px;

        .container {
            display: grid;

            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

        }

        .card:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
        }

        footer {
            margin-top: 20px;
            color: white;
        }
