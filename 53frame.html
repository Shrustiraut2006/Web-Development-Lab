<!DOCTYPE html>
<html>
<head>
    <title>Different Frames Example</title>
</head>
<body>

    <h1>Different Iframe Content</h1>

    <!-- First Frame (Wikipedia) -->
    <h2>Wikipedia Website</h2>
    <iframe 
        src="https://www.wikipedia.org"
        width="800"
        height="400"
        frameborder="1">
    </iframe>

    <br><br>

    <!-- Second Frame (Local HTML Page) -->
    <h2>Local Page Frame</h2>
    <iframe 
        src="page.html"
        width="800"
        height="400"
        frameborder="1">
    </iframe>

</body>
</html>
